name: "💭 빠른 아이디어 메모"
description: "틈날 때 한 줄로 적어두는 가벼운 메모. 나중에 다듬어서 구현 이슈로 발전시킵니다."
title: "[Idea] "
labels: ["idea", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        > 💭 부담 없이 한 줄만 적어도 됩니다. 나중에 다른 템플릿으로 구체화하면 됩니다.

  - type: textarea
    id: idea
    attributes:
      label: "아이디어 (한 줄이면 충분)"
      placeholder: "예) 셀 실행 끝나면 소리/알림 띄우는 매직 있으면 좋겠다."
    validations:
      required: true

  - type: textarea
    id: note
    attributes:
      label: "메모 (선택)"
      description: "떠오른 맥락, 제약, 참고할 것 등 아무거나."

  - type: checkboxes
    id: nextstep
    attributes:
      label: "다음 단계 (선택)"
      options:
        - label: "나중에 구체적인 구현 이슈로 발전시키기"
        - label: "폐쇄망에서 가능한지 먼저 확인 필요"
