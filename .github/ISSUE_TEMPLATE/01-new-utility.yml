name: "🧰 새 유틸리티 / 기능 제안"
description: "Jupyter 작업을 편하게 해줄 새 유틸리티(함수·모듈·도구)를 제안합니다."
title: "[Utility] "
labels: ["enhancement", "utility"]
body:
  - type: markdown
    attributes:
      value: |
        > 💡 이 이슈는 나중에 **Claude Code / Codex** 같은 AI 에이전트가 구현할 예정입니다.
        > 아이디어 단계여도 좋지만, **무엇을 / 왜 / 어떤 제약 위에서** 만드는지를 적어두면
        > 나중에 그대로 작업 지시문이 됩니다.

  - type: textarea
    id: problem
    attributes:
      label: "해결하려는 문제 / 불편함"
      description: "지금 Jupyter에서 어떤 작업이 번거롭거나 반복적인가요?"
      placeholder: "예) 매번 대용량 parquet을 읽을 때 메모리 사용량을 눈으로 확인하기 어렵다."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: "제안하는 유틸리티"
      description: "무엇을 만들고 싶은지, 어떻게 동작했으면 하는지 적어주세요."
      placeholder: "예) df.memory_usage를 사람이 읽기 쉬운 표로 보여주고, 컬럼별 다운캐스팅을 제안하는 함수."
    validations:
      required: true

  - type: textarea
    id: usage
    attributes:
      label: "사용 예시 (있다면)"
      description: "원하는 호출 방식이나 출력 형태를 코드로 적어주세요."
      render: python
      placeholder: |
        from jupyter_utils import mem_report
        mem_report(df)   # -> 컬럼별 메모리 표 + 다운캐스팅 제안

  - type: dropdown
    id: form
    attributes:
      label: "구현 형태 (예상)"
      description: "용도로 고르세요 — 노트북=매직/함수, 터미널=셸/CLI. 여러 형태면 가장 가까운 것, 모르면 '잘 모르겠음'."
      options:
        - "파이썬 함수 / 모듈"
        - "IPython 매직 커맨드 (%, %%)"
        - "ipywidgets 인터랙티브 위젯"
        - "셸 스크립트 / CLI"
        - "Jupyter 확장 (extension) / 설정"
        - "잘 모르겠음 (AI가 적절히 선택)"
    validations:
      required: true

  - type: checkboxes
    id: constraints
    attributes:
      label: "환경 제약 (해당되는 것 모두 체크)"
      description: "폐쇄망/공유환경 특성상 구현 방식이 달라집니다. 중요합니다!"
      options:
        - label: "🚫 인터넷 차단 (폐쇄망) — pip install로 새 패키지 받기 불가/어려움"
        - label: "📦 추가 패키지 설치가 어렵다 (표준 라이브러리 + 이미 깔린 것 위주로)"
        - label: "🔒 관리자/sudo 권한 없음"
        - label: "🔁 Jupyter 서버 재시작 불가 (커널 재시작은 가능)"
        - label: "👥 여러 사람이 함께 쓰는 공유 환경"

  - type: textarea
    id: available_env
    attributes:
      label: "사용 가능한 패키지 / 버전 (아는 만큼)"
      description: "이미 설치되어 쓸 수 있는 라이브러리와 버전을 적어두면 AI가 그 안에서 구현합니다."
      placeholder: "예) Python 3.10, pandas 2.0, numpy 1.24, ipywidgets 8.x, matplotlib 3.7 / 인터넷 X"

  - type: dropdown
    id: delivery
    attributes:
      label: "추가 의존성 / 반입 계획"
      description: "새 패키지가 필요하면 폐쇄망에 어떻게 들어오나요? (prebuilt wheel 오프라인 번들 권장)"
      options:
        - "추가 의존성 없음 (표준 라이브러리 + 이미 설치된 것만)"
        - "선택적(optional) 의존성으로 분리 — extras + lazy import"
        - "prebuilt wheel 오프라인 번들로 반입 예정"
        - "잘 모르겠음 (AI가 의존성 최소화 + extras 설계 제안)"
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: "외부 백엔드 접근 여부"
      description: "외부 스토리지/데이터(쿼리·파일 등)에 접근한다면, 백엔드 비종속 설계가 필요합니다."
      options:
        - "외부 백엔드 접근 없음 (순수 로컬/계산)"
        - "외부 백엔드 접근 있음 — 백엔드 교체 가능하게 설계 필요"
        - "잘 모르겠음"
    validations:
      required: true

  - type: textarea
    id: backend_detail
    attributes:
      label: "백엔드 상세 (외부 접근이 있다면)"
      description: |
        지금 쓰는 백엔드와 향후 바뀔 수 있는 후보를 적어주세요.
        구현은 추상 인터페이스 + 교체 가능한 어댑터(설정/환경변수로 주입) 방식을 기본으로 합니다.
      placeholder: |
        예) 현재: AWS S3 / 향후 후보: GCP GCS, 사내 NFS
        예) 현재: 사내 Hive / 향후: BigQuery
        - 인증: 환경변수로 주입, 코드에 하드코딩 X
        - 특정 SDK 미설치 환경에서도 import 단계에서 죽지 않게 (lazy import)

  - type: textarea
    id: acceptance
    attributes:
      label: "완료 조건 (Acceptance Criteria)"
      description: "이게 만족되면 '끝'이라고 볼 수 있는 조건. AI에게 넘길 때 작업 지시문이 됩니다."
      placeholder: |
        - [ ] mem_report(df) 호출 시 컬럼별 메모리 표가 출력된다
        - [ ] 인터넷 없이 표준 라이브러리 + pandas만으로 동작한다
        - [ ] 사용법을 보여주는 예제 노트북/도큐스트링이 있다
