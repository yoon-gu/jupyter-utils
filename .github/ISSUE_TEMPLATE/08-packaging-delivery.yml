name: "📦 패키징 / 반입 (오프라인 번들)"
description: "repo를 wheel로 빌드하고, 의존성·prebuilt 확장까지 모아 폐쇄망에 한 번에 반입하는 작업."
title: "[Pkg] "
labels: ["packaging", "delivery"]
body:
  - type: markdown
    attributes:
      value: |
        > 📦 외부에서 wheel + 의존성 wheel을 **하나의 오프라인 번들**로 모아 반입하고,
        > 폐쇄망에서 `pip install --no-index --find-links=<번들> ...` 로 설치하는 흐름을 다룹니다.
        >
        > ⚠️ wheel 반입 자체는 가능. **진짜 게이트는 의존 패키지(전이 의존 포함)의 정보보안 검토**입니다.
        > → 의존성 최소화 + 매니페스트(SBOM류) 제출이 핵심.

  - type: textarea
    id: goal
    attributes:
      label: "무엇을 패키징/반입하나요?"
      placeholder: |
        예) jupyter_utils 본체 + 백엔드 어댑터 + ipywidgets/tqdm + jupyter-resource-usage(prebuilt) 를
            하나의 번들로 만들어 반입한다.
    validations:
      required: true

  - type: textarea
    id: target_env
    attributes:
      label: "타깃 환경 사양 (정확히)"
      description: "wheel은 OS/Python/아키텍처가 맞아야 설치됩니다. 아는 만큼 정확히."
      placeholder: |
        예) Linux x86_64 (manylinux2014), Python 3.10, glibc 2.x
            JupyterLab 4.x / notebook 7.x
    validations:
      required: true

  - type: dropdown
    id: kind
    attributes:
      label: "반입 형태"
      options:
        - "이 repo를 wheel로 빌드"
        - "의존성 wheel 수집 (pip download / pip wheel)"
        - "prebuilt JupyterLab 확장 wheel 포함"
        - "오프라인 설치 스크립트 / 번들 아카이브 생성"
        - "위 전체 (end-to-end 번들 파이프라인)"
    validations:
      required: true

  - type: textarea
    id: extras
    attributes:
      label: "포함할 선택적 의존성 (extras)"
      description: "백엔드 SDK 등은 extras로 분리합니다. 어떤 것을 번들에 넣을지."
      placeholder: |
        예) [s3]=boto3, [gcs]=google-cloud-storage, [widgets]=ipywidgets, [profile]=line_profiler
            이번 반입엔 [s3], [widgets] 만 포함

  - type: textarea
    id: security_manifest
    attributes:
      label: "의존성 / 보안검토 명세 (⭐ 핵심)"
      description: "들여올 모든 의존(+전이 의존)이 정보보안 검토 대상입니다. 검토에 낼 명세를 정리하세요."
      placeholder: |
        패키지별로:
        - 이름/버전(핀 고정): boto3==1.34.x
        - 용도: S3 어댑터 구현
        - 라이선스: Apache-2.0
        - 전이 의존: botocore, jmespath, s3transfer, urllib3, ...
        - wheel 해시(sha256): ...
        대안 검토: 표준 라이브러리/이미 설치된 것/소규모 vendoring으로 의존 제거 가능한가?

  - type: checkboxes
    id: constraints
    attributes:
      label: "제약 / 주의 (해당되는 것 체크)"
      options:
        - label: "🚫 폐쇄망 안에서는 PyPI 접근 불가 → --no-index 설치만 가능"
        - label: "📋 의존(+전이 의존)이 정보보안 검토 대상 → 매니페스트/SBOM 필요, 의존성 최소화 우선"
        - label: "✂️ 의존 줄이려 소규모 vendoring 또는 extras 분리를 검토했다"
        - label: "📌 버전·해시 핀 고정(reproducible)으로 수집했다"
        - label: "🔒 관리자 권한 없음 → --user 또는 가상환경 설치 필요"
        - label: "🧱 빌드 도구(컴파일러) 없음 → 순수 wheel(빌드 불필요)만 반입"
        - label: "🔄 확장은 pip 설치 후 새로고침으로 로드됨(서버 재시작 큰 문제 아님). 서버 측 변경 필요분은 별도 확인"

  - type: textarea
    id: acceptance
    attributes:
      label: "완료 조건 (Acceptance Criteria)"
      placeholder: |
        - [ ] `python -m build` 로 jupyter_utils wheel 생성
        - [ ] 타깃 사양에 맞는 의존성 wheel을 전이 의존까지 한 폴더로 수집
        - [ ] `pip install --no-index --find-links=<폴더> jupyter_utils[s3,widgets]` 가 오프라인에서 성공
        - [ ] 보안검토용 의존성 매니페스트(이름·버전·용도·라이선스·해시·전이 의존) 생성
        - [ ] 버전/해시 핀 고정, 의존성 최소화(가능한 vendoring/extras 분리) 검토 완료
        - [ ] 설치/반입 절차가 문서화됨
